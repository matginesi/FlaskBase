<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
</head>
<body style="margin:0;padding:0;background:#eef3f8;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica Neue,Arial,sans-serif;color:#1e293b;">
  <div style="display:none;max-height:0;overflow:hidden;opacity:0;">{{ preheader }}</div>
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#eef3f8;">
    <tr>
      <td align="center" style="padding:28px 16px;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:680px;background:#ffffff;border:1px solid #dbe4ee;border-radius:18px;overflow:hidden;">
          <tr>
            <td style="padding:18px 22px;background:#0f1923;color:#ffffff;">
              <div style="font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:#8fa3b8;">WebApp</div>
              <div style="font-size:22px;font-weight:700;margin-top:6px;">{{ title }}</div>
            </td>
          </tr>
          <tr>
            <td style="padding:22px;">
              {% block email_body %}{% endblock %}
              <div style="margin-top:22px;">
                <a href="{{ action_url or inbox_url }}" style="display:inline-block;padding:11px 16px;border-radius:10px;background:#2563eb;color:#ffffff;text-decoration:none;font-weight:600;">
                  {{ action_label or 'Open inbox' }}
                </a>
              </div>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 22px;border-top:1px solid #e5eaf0;color:#64748b;font-size:13px;">
              This email was generated by WebApp. If you prefer, you can read the full message in your inbox:
              <a href="{{ inbox_url }}" style="color:#2563eb;text-decoration:none;">{{ inbox_url }}</a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
