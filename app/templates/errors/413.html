<!doctype html>
<html lang="{{ g.ui_lang | default('en') }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>413 · {{ tr('errors.413_title', 'Payload too large') }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style nonce="{{ g.csp_nonce }}">
    body{background:#f0f4f8;font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;}
    .err-wrap{max-width:600px;}
    .err-card{background:#fff;border:1px solid #e5eaf0;border-radius:14px;padding:2rem 1.6rem;box-shadow:0 10px 28px rgba(15,25,35,.08);}
    .err-num{font-size:5.4rem;font-weight:800;color:#d97706;line-height:1;letter-spacing:-.04em;}
    .err-icon{font-size:1.25rem;color:#d97706;}
  </style>
</head>
<body>
  <div class="err-wrap text-center px-3">
    <div class="err-card">
      <div class="err-num">413</div>
      <h2 class="mb-2 d-flex align-items-center justify-content-center gap-2">
        <i class="bi bi-file-earmark-zip err-icon"></i>{{ tr('errors.413_title', 'Payload too large') }}
      </h2>
      <p class="text-muted mb-4">{{ tr('errors.payload_too_large_message', 'The request exceeds the allowed limit. Reduce the file or payload size and try again.') }}</p>
      <a href="/" class="btn btn-primary"><i class="bi bi-house me-2"></i>{{ tr('errors.back_home', 'Back to dashboard') }}</a>
    </div>
  </div>
</body>
</html>
