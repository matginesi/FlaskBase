<!doctype html>
<html lang="{{ g.ui_lang | default('en') }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Privacy Policy · {{ g.app_name }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
</head>
<body>
<div class="container py-4 py-md-5">
  <div class="mx-auto" style="max-width:860px;">
    <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
      <h1 class="h3 mb-0"><i class="bi bi-shield-check me-2 text-primary"></i>Privacy Policy</h1>
      <a class="btn btn-outline-primary btn-sm" href="{{ url_for('auth.login') }}">
        <i class="bi bi-box-arrow-in-right me-1"></i>Torna al login
      </a>
    </div>
    <p class="text-muted">Ultimo aggiornamento: {{ now.strftime('%d/%m/%Y') }}</p>
    <div class="card">
      <div class="card-body">
        {% include "partials/privacy_policy_content.html" %}
      </div>
    </div>
  </div>
</div>
</body>
</html>
